# Monokai Theme
# Inspired by the classic Monokai color palette

COLOR_BASH="#1a1a0a"     # Dark yellow   — shell commands
COLOR_CODE="#150a1a"     # Dark magenta  — writing code
COLOR_READ="#0a1a15"     # Dark mint     — reading/searching
COLOR_AGENT="#0a151a"    # Dark cyan     — subagent working
COLOR_INPUT="#2a0f0a"    # Warm red      — needs your input
COLOR_IDLE="#1a1a1a"     # Neutral dark  — thinking
COLOR_DONE="#0f1a0a"     # Soft green    — done, your turn
COLOR_NOTIFY="#2a1a0a"   # Orange glow   — notification
COLOR_TOOL="#1a1a2a"     # Indigo dark   — other tools
